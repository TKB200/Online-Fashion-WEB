<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Product Grid</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

/* GRID CONTAINER */
.products{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:25px;
}

/* PRODUCT CARD */
.product{
    background:#fff;
    padding:10px;
    text-align:center;
    position:relative;
    border-radius:6px;
}

/* PRODUCT IMAGE */
.product img{
    width:100%;
    height:400px;
    object-fit:cover;
    border-radius:4px;
}

/* BADGE */
.badge{
    position:absolute;
    top:15px;
    left:15px;
    background:#1db954;
    color:white;
    font-size:12px;
    padding:5px 8px;
    border-radius:3px;
}

/* PRODUCT NAME */
.product h3{
    margin:10px 0 5px;
}

/* RATING */
.rating{
    color:gold;
    font-size:14px;
}

/* PRICE */
.price{
    margin-top:5px;
}

.old-price{
    text-decoration:line-through;
    color:gray;
    font-size:14px;
}

.new-price{
    color:black;
    font-weight:bold;
    margin-left:5px;
}

.save{
    color:red;
    font-size:13px;
    margin-left:5px;
}

/* RESPONSIVE */
@media(max-width:1000px){
    .products{
        grid-template-columns: repeat(2, 1fr);
    }
}

@media(max-width:600px){
    .products{
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>

<h2>Featured Collection</h2>

<div class="products">

    <!-- PRODUCT 1 -->
    <div class="product">
        <span class="badge">READY TO DISPATCH</span>
        <img src="Lady1.jpg" alt="">
        <h3>IZEL</h3>
        <div class="rating">★★★★★ (1)</div>
        <div class="price">
            <span class="new-price">Rs. 8,062.50</span>
        </div>
    </div>

    <!-- PRODUCT 2 -->
    <div class="product">
        <span class="badge">READY TO DISPATCH</span>
        <img src="Lady1.jpg" alt="">
        <h3>Gulnaz</h3>
        <div class="rating">★★★★★ (45)</div>
        <div class="price">
            <span class="old-price">Rs. 20,750.00</span>
            <span class="new-price">Rs. 12,498.75</span>
            <span class="save">Save 40%</span>
        </div>
    </div>

    <!-- PRODUCT 3 -->
    <div class="product">
        <span class="badge">READY TO DISPATCH</span>
        <img src="Lady1.jpg" alt="">
        <h3>Noori</h3>
        <div class="rating">★★★★★ (23)</div>
        <div class="price">
            <span class="old-price">Rs. 22,212.50</span>
            <span class="new-price">Rs. 17,392.50</span>
            <span class="save">Save 22%</span>
        </div>
    </div>

    <!-- PRODUCT 4 -->
    <div class="product">
        <span class="badge">READY TO DISPATCH</span>
        <img src="Lady1.jpg" alt="">
        <h3>Diya</h3>
        <div class="rating">★★★★★ (28)</div>
        <div class="price">
            <span class="old-price">Rs. 19,250.00</span>
            <span class="new-price">Rs. 12,498.75</span>
            <span class="save">Save 35%</span>
        </div>
    </div>

</div>

</body>
</html>
